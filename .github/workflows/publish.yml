name: Test & Publish

on:
  push:
    branches: ["main", "test"]

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python (uv)
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (uv)
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy json_logic/

      - name: Run tests
        run: uv run pytest --cov=json_logic --cov-report=term-missing -q

  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: test
    # publish job will run on pushes to either main or test; the steps below
    # conditionally publish to TestPyPI (if branch == test) or to PyPI (if main)

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python (uv build)
        run: uv python install 3.12

      - name: Sync build dependencies (uv)
        run: uv sync --all-extras

      - name: Build sdist and wheel (uv)
        run: uv build

      - name: Publish to TestPyPI
        if: github.ref == 'refs/heads/test'
        uses: pypa/gh-action-pypi-publish@v1.5.0
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: github.ref == 'refs/heads/main'
        uses: pypa/gh-action-pypi-publish@v1.5.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

